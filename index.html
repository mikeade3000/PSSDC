<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lagos State Scholarship Board — CBT Platform</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
  :root {
    --navy: #0A3D62;
    --navy-dark: #062744;
    --navy-mid: #12507F;
    --gold: #C9922A;
    --gold-light: #E4B563;
    --bg: #F3F5F8;
    --card: #FFFFFF;
    --ink: #16232E;
    --ink-soft: #57677A;
    --border: #E1E6EC;
    --danger: #C0392B;
    --danger-bg: #FDECEA;
    --success: #1E8449;
    --success-bg: #E9F7EF;
    --warn: #B7791F;
    --warn-bg: #FEF3E2;
    --radius: 10px;
    --shadow: 0 2px 10px rgba(10, 61, 98, 0.08);
  }
  * { box-sizing: border-box; }
  body { margin: 0; font-family: 'Inter', system-ui, sans-serif; background: var(--bg); color: var(--ink); }
  .mono { font-family: 'JetBrains Mono', monospace; }
  button { font-family: inherit; cursor: pointer; }
  input, select, textarea { font-family: inherit; }

  /* ---------- Shell ---------- */
  #app { min-height: 100vh; display: flex; flex-direction: column; }
  .topbar {
    background: var(--navy-dark);
    color: #fff;
    padding: 14px 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    box-shadow: var(--shadow);
    position: relative;
    z-index: 10;
  }
  .brand { display: flex; align-items: center; gap: 12px; }
  .brand .crest {
    width: 38px; height: 38px; border-radius: 8px;
    background: linear-gradient(135deg, var(--gold), var(--gold-light));
    display: flex; align-items: center; justify-content: center;
    font-weight: 800; color: var(--navy-dark); font-size: 16px;
  }
  .brand-text { line-height: 1.25; }
  .brand-text .t1 { font-weight: 700; font-size: 14.5px; letter-spacing: 0.2px; }
  .brand-text .t2 { font-size: 11.5px; color: #B9CBDA; text-transform: uppercase; letter-spacing: 1px; }
  .topbar-right { display: flex; align-items: center; gap: 14px; font-size: 14px; }
  .role-pill {
    background: var(--gold); color: var(--navy-dark); font-weight: 700;
    padding: 4px 12px; border-radius: 999px; font-size: 11.5px; text-transform: uppercase; letter-spacing: 0.5px;
  }
  .btn-logout {
    background: transparent; border: 1px solid #2E5D82; color: #fff; padding: 7px 14px;
    border-radius: 7px; font-size: 13px; font-weight: 500;
  }
  .btn-logout:hover { background: #123655; }

  main { flex: 1; padding: 28px; max-width: 1180px; margin: 0 auto; width: 100%; }

  .footer {
    text-align: center; padding: 16px; font-size: 12px; color: var(--ink-soft);
    border-top: 1px solid var(--border); background: var(--card);
  }
  .footer strong { color: var(--navy); }

  /* ---------- Cards / layout ---------- */
  .card {
    background: var(--card); border: 1px solid var(--border); border-radius: var(--radius);
    padding: 22px; box-shadow: var(--shadow); margin-bottom: 20px;
  }
  .card h2 { margin: 0 0 4px; font-size: 18px; color: var(--navy-dark); }
  .card .sub { color: var(--ink-soft); font-size: 13px; margin-bottom: 16px; }
  .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
  @media (max-width: 800px) { .grid-2 { grid-template-columns: 1fr; } }

  label { display: block; font-size: 13px; font-weight: 600; color: var(--ink); margin: 12px 0 6px; }
  input[type=text], input[type=password], input[type=number], select, textarea {
    width: 100%; padding: 10px 12px; border: 1px solid var(--border); border-radius: 7px; font-size: 14px;
    background: #fff; color: var(--ink);
  }
  input:focus, select:focus, textarea:focus { outline: 2px solid var(--navy-mid); outline-offset: 1px; border-color: var(--navy-mid); }
  textarea { resize: vertical; min-height: 70px; }

  .btn { background: var(--navy); color: #fff; border: none; padding: 11px 20px; border-radius: 7px; font-weight: 600; font-size: 14px; }
  .btn:hover { background: var(--navy-mid); }
  .btn:disabled { background: #A9B7C3; cursor: not-allowed; }
  .btn-gold { background: var(--gold); color: var(--navy-dark); }
  .btn-gold:hover { background: var(--gold-light); }
  .btn-danger { background: var(--danger); color: #fff; }
  .btn-outline { background: transparent; border: 1px solid var(--navy); color: var(--navy); }
  .btn-sm { padding: 7px 12px; font-size: 12.5px; border-radius: 6px; }

  table { width: 100%; border-collapse: collapse; font-size: 13.5px; }
  th, td { text-align: left; padding: 9px 10px; border-bottom: 1px solid var(--border); }
  th { color: var(--ink-soft); font-weight: 600; font-size: 12px; text-transform: uppercase; letter-spacing: 0.4px; }

  .badge { display: inline-block; padding: 3px 9px; border-radius: 999px; font-size: 11.5px; font-weight: 700; }
  .badge-ok { background: var(--success-bg); color: var(--success); }
  .badge-warn { background: var(--warn-bg); color: var(--warn); }
  .badge-danger { background: var(--danger-bg); color: var(--danger); }

  /* ---------- Login ---------- */
  .login-wrap {
    flex: 1; display: flex; align-items: center; justify-content: center;
    background: radial-gradient(circle at 20% 20%, #12507F 0%, #062744 60%, #041B30 100%);
  }
  .login-card {
    width: 380px; background: var(--card); border-radius: 14px; padding: 34px 32px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.35);
  }
  .login-crest {
    width: 56px; height: 56px; border-radius: 12px; margin: 0 auto 16px;
    background: linear-gradient(135deg, var(--gold), var(--gold-light));
    display: flex; align-items: center; justify-content: center; font-weight: 800; color: var(--navy-dark); font-size: 22px;
  }
  .login-title { text-align: center; font-size: 17px; font-weight: 700; color: var(--navy-dark); margin-bottom: 2px; }
  .login-sub { text-align: center; font-size: 12.5px; color: var(--ink-soft); margin-bottom: 24px; }
  .error-msg { background: var(--danger-bg); color: var(--danger); padding: 9px 12px; border-radius: 7px; font-size: 13px; margin-top: 12px; }

  /* ---------- Permission gate ---------- */
  .gate-overlay {
    position: fixed; inset: 0; background: var(--navy-dark); z-index: 999;
    display: flex; align-items: center; justify-content: center; color: #fff;
  }
  .gate-card { max-width: 480px; padding: 40px; text-align: center; }
  .gate-icon { font-size: 44px; margin-bottom: 14px; }
  .gate-card h2 { color: #fff; margin-bottom: 8px; }
  .gate-card p { color: #C7D6E3; font-size: 14.5px; line-height: 1.6; }
  .gate-list { text-align: left; background: rgba(255,255,255,0.06); border-radius: 8px; padding: 16px 20px; margin: 18px 0; font-size: 13.5px; color: #DCE7F0; }
  .gate-list li { margin-bottom: 6px; }

  /* ---------- Exam interface ---------- */
  .exam-shell { display: grid; grid-template-columns: 1fr 260px; gap: 20px; }
  @media (max-width: 900px) { .exam-shell { grid-template-columns: 1fr; } }
  .exam-topbar {
    display: flex; align-items: center; justify-content: space-between;
    background: var(--navy-dark); color: #fff; padding: 12px 20px; border-radius: 10px; margin-bottom: 18px;
  }
  .rec-indicator { display: flex; align-items: center; gap: 8px; font-weight: 700; font-size: 13.5px; }
  .rec-dot {
    width: 11px; height: 11px; border-radius: 50%; background: #E74C3C;
    animation: pulse 1.4s infinite;
  }
  @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.35; } }
  .timer { font-family: 'JetBrains Mono', monospace; font-size: 17px; font-weight: 700; }
  .timer.low { color: #FF8A80; }

  .question-nav { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 12px; }
  .qn-btn {
    width: 32px; height: 32px; border-radius: 6px; border: 1px solid var(--border); background: #fff;
    font-size: 12.5px; font-weight: 600; color: var(--ink-soft);
  }
  .qn-btn.answered { background: var(--success-bg); border-color: var(--success); color: var(--success); }
  .qn-btn.current { background: var(--navy); border-color: var(--navy); color: #fff; }

  .q-prompt { font-size: 16px; font-weight: 600; margin-bottom: 18px; line-height: 1.5; }
  .options-list { display: flex; flex-direction: column; gap: 10px; }
  .option-row {
    display: flex; align-items: center; gap: 12px; padding: 12px 14px; border: 1.5px solid var(--border);
    border-radius: 8px; cursor: pointer; font-size: 14.5px;
  }
  .option-row:hover { border-color: var(--navy-mid); }
  .option-row.selected { border-color: var(--navy); background: #EAF1F7; }
  .option-row input { margin: 0; }

  .dragdrop-list { display: flex; flex-direction: column; gap: 8px; }
  .drag-item {
    padding: 12px 14px; border: 1.5px solid var(--border); border-radius: 8px; background: #fff;
    display: flex; align-items: center; gap: 10px; cursor: grab; font-size: 14px;
  }
  .drag-item.dragging { opacity: 0.4; }
  .drag-handle { color: var(--ink-soft); font-size: 16px; }
  .drag-index { width: 22px; height: 22px; border-radius: 50%; background: var(--navy); color: #fff; font-size: 11.5px; font-weight: 700; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }

  .match-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 24px; }
  .match-col-title { font-size: 12px; text-transform: uppercase; letter-spacing: 0.5px; color: var(--ink-soft); margin-bottom: 8px; font-weight: 700; }
  .match-item { padding: 10px 12px; border: 1.5px solid var(--border); border-radius: 7px; margin-bottom: 8px; font-size: 14px; background: #fff; }
  .match-select { margin-top: 4px; }

  .side-panel .card { padding: 18px; }
  .cam-preview { width: 100%; border-radius: 8px; background: #000; aspect-ratio: 4/3; object-fit: cover; }

  .exam-actions { display: flex; justify-content: space-between; margin-top: 22px; }

  .violation-toast {
    position: fixed; top: 20px; right: 20px; background: var(--danger); color: #fff; padding: 14px 20px;
    border-radius: 8px; box-shadow: 0 8px 24px rgba(0,0,0,0.25); z-index: 1000; font-size: 14px; font-weight: 600;
    max-width: 320px;
  }

  .empty-state { text-align: center; padding: 40px 20px; color: var(--ink-soft); }
  .hidden { display: none !important; }

  /* ---------- Bulk upload ---------- */
  .bulk-instructions {
    background: #EAF1F7; border-radius: 8px; padding: 14px 16px; font-size: 13px; color: var(--ink); margin-bottom: 14px; line-height: 1.6;
  }
  .bulk-instructions code { background: #fff; padding: 1px 5px; border-radius: 4px; font-size: 12px; }
  .template-link { font-size: 12.5px; color: var(--navy); text-decoration: underline; cursor: pointer; background: none; border: none; padding: 0; font-weight: 600; }
  .template-link:hover { color: var(--navy-mid); }
  .file-row { display: flex; align-items: center; gap: 12px; margin: 14px 0; flex-wrap: wrap; }
  input[type=file] { font-size: 13px; }
  .preview-wrap { max-height: 260px; overflow: auto; border: 1px solid var(--border); border-radius: 8px; margin: 12px 0; }
  .preview-wrap table { font-size: 12.5px; }
  .row-error { background: var(--danger-bg); }
</style>
</head>
<body>

<div id="app"></div>

<script>
/* ============================================================
   LAGOS STATE SCHOLARSHIP BOARD — CBT PLATFORM
   Frontend application logic
   Developed by MIFANET RESOURCES for the Lagos State
   Scholarship Board. Copyright (c) 2026.
   ============================================================ */

// ---------- CONFIG ----------
// Paste your deployed Google Apps Script Web App URL here after setup.
const API_BASE_URL = 'https://script.google.com/macros/s/AKfycbw3li3pLM9vOO75gW8wyFRwwpiO4QvOOqR1CTST3mAO3WG0Z0ddPVDdW7QrObCRHQ6u/exec';

const RECORDING_CHUNK_SECONDS = 15;   // how often a video chunk is finalized and uploaded (kept short so each upload is small and survives weak connections)
const ANSWER_SYNC_INTERVAL_MS = 20000; // batch-sync answers to backend every 20s
const HEARTBEAT_INTERVAL_MS = 45000;
// Candidate-conduct violations (tab switch, fullscreen exit, window blur) are
// counted and logged so the examiner can weigh them when reviewing the sitting.
// They carry NO automatic penalty for the candidate — recommended actions are
// shown to the examiner in the monitoring view as a suggestion only, and every
// decision (accept, review recording, invalidate, allow retake) belongs to the
// examiner. Technical problems (e.g. recording upload failures) are logged
// separately and never attributed to candidate conduct.
const CONDUCT_VIOLATION_TYPES = ['tab_switch', 'fullscreen_exit', 'window_blur'];

// Bootstrap admin credential — lets you into the Admin panel before the
// Apps Script backend is deployed or before setupSheetsAndFolders has been
// run. Only used as a fallback when the real backend is unreachable or not
// yet initialized; once the backend is live with real accounts, the normal
// login path is always tried first and takes priority. Because this
// password is visible in client-side source, don't rely on it for security
// once this file is hosted somewhere reachable by people you don't trust —
// treat it purely as a setup convenience, and it's meaningless as an
// access control once real data exists (bootstrap mode can't touch any
// backend data at all).
const BOOTSTRAP_ADMIN_USERNAME = 'admin';
const BOOTSTRAP_ADMIN_PASSWORD = 'Mifanet@2026Bootstrap';

// ---------- TINY STATE STORE ----------
const state = {
  user: null,           // {userId, username, role, fullName}
  currentView: 'login',
  exam: null,
  questions: [],
  answers: {},          // questionId -> answer value
  currentQuestionIndex: 0,
  bootstrapMode: false,
  bulkUserRows: [],
  bulkQuestionRows: [],
  serverRemainingSec: null,
  isResumedSession: false,
  timeRemainingSec: 0,
  timerHandle: null,
  syncHandle: null,
  heartbeatHandle: null,
  mediaStream: null,
  mediaRecorder: null,
  recordedChunks: [],
  chunkIndex: 0,
  recordingHealth: 'starting', // 'starting' | 'ok' | 'warning' | 'failed'
  recordingFailCount: 0,
  violationCount: 0,
  examSubmitted: false
};

// ---------- API HELPER ----------
async function apiGet(action, params) {
  const url = new URL(API_BASE_URL);
  url.searchParams.set('action', action);
  Object.entries(params || {}).forEach(([k, v]) => url.searchParams.set(k, v));
  const res = await fetch(url.toString());
  return res.json();
}

async function apiPost(action, payload, timeoutMs) {
  const controller = timeoutMs ? new AbortController() : null;
  const timeoutHandle = timeoutMs ? setTimeout(() => controller.abort(), timeoutMs) : null;
  try {
    const res = await fetch(API_BASE_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'text/plain;charset=utf-8' }, // avoids CORS preflight against Apps Script
      body: JSON.stringify({ action, payload }),
      signal: controller ? controller.signal : undefined
    });
    return res.json();
  } finally {
    if (timeoutHandle) clearTimeout(timeoutHandle);
  }
}

// ---------- LOCAL PERSISTENCE (local-first answers) ----------
const LOCAL_KEY_PREFIX = 'lagoscbt_';

function localSaveAnswers() {
  if (!state.exam || !state.user) return;
  const key = LOCAL_KEY_PREFIX + state.exam.examId + '_' + state.user.userId;
  localStorage.setItem(key, JSON.stringify({
    answers: state.answers,
    timeRemainingSec: state.timeRemainingSec,
    savedAt: Date.now()
  }));
}

function localLoadAnswers() {
  if (!state.exam || !state.user) return null;
  const key = LOCAL_KEY_PREFIX + state.exam.examId + '_' + state.user.userId;
  const raw = localStorage.getItem(key);
  return raw ? JSON.parse(raw) : null;
}

// ---------- RENDER ROOT ----------
function render() {
  const app = document.getElementById('app');
  if (state.currentView === 'login') { app.innerHTML = renderLogin(); attachLoginHandlers(); return; }

  app.innerHTML = `
    <div class="topbar">
      <div class="brand">
        <div class="crest">LG</div>
        <div class="brand-text">
          <div class="t1">Lagos State Scholarship Board</div>
          <div class="t2">Computer Based Testing Platform</div>
        </div>
      </div>
      <div class="topbar-right">
        <span class="role-pill">${state.user.role}</span>
        <span>${state.user.fullName}</span>
        <button class="btn-logout" id="logoutBtn">Log out</button>
      </div>
    </div>
    <main id="mainContent"></main>
    <div class="footer">
      Developed by <strong>MIFANET RESOURCES</strong> for the Lagos State Scholarship Board. Copyright &copy; 2026.
    </div>
  `;
  document.getElementById('logoutBtn').onclick = logout;

  const main = document.getElementById('mainContent');
  if (state.currentView === 'admin') { main.innerHTML = renderAdmin(); attachAdminHandlers(); }
  else if (state.currentView === 'examiner') { main.innerHTML = renderExaminer(); attachExaminerHandlers(); }
  else if (state.currentView === 'candidateHome') { main.innerHTML = renderCandidateHome(); attachCandidateHomeHandlers(); }
  else if (state.currentView === 'permissionGate') { main.innerHTML = renderPermissionGate(); attachGateHandlers(); }
  else if (state.currentView === 'exam') { main.innerHTML = renderExam(); attachExamHandlers(); }
  else if (state.currentView === 'examSubmitted') { main.innerHTML = renderSubmitted(); }
}

// ---------- LOGIN ----------
function renderLogin() {
  return `
    <div class="login-wrap">
      <div class="login-card">
        <div class="login-crest">LG</div>
        <div class="login-title">Lagos State Scholarship Board</div>
        <div class="login-sub">Computer Based Testing Platform</div>
        <label>Username</label>
        <input type="text" id="loginUsername" placeholder="Enter your username" />
        <label>Password</label>
        <input type="password" id="loginPassword" placeholder="Enter your password" />
        <button class="btn btn-gold" id="loginBtn" style="width:100%;margin-top:20px;">Sign in</button>
        <div id="loginError"></div>
      </div>
    </div>
  `;
}

function attachLoginHandlers() {
  document.getElementById('loginBtn').onclick = async () => {
    const username = document.getElementById('loginUsername').value.trim();
    const password = document.getElementById('loginPassword').value;
    const errEl = document.getElementById('loginError');
    errEl.innerHTML = '';
    if (!username || !password) {
      errEl.innerHTML = '<div class="error-msg">Please enter both username and password.</div>';
      return;
    }
    const isConfigured = API_BASE_URL && API_BASE_URL.indexOf('PASTE_YOUR') === -1;

    // Try the real backend first, unless it's obviously still unconfigured.
    if (isConfigured) {
      try {
        const result = await apiPost('login', { username, password });
        if (result.success) {
          state.user = result.user;
          state.bootstrapMode = false;
          routeToRoleHome();
          return;
        }
        // Backend reachable but rejected — if it looks like Sheets aren't
        // set up yet, fall through to bootstrap check; otherwise show the
        // real error (e.g. genuinely wrong password for a real account).
        const setupNotDone = /Sheet not found|Run setupSheetsAndFolders/i.test(result.error || '');
        if (!setupNotDone) {
          errEl.innerHTML = `<div class="error-msg">${result.error || 'Login failed.'}</div>`;
          return;
        }
      } catch (e) {
        // Network/deployment error — fall through to bootstrap check below.
      }
    }

    // Bootstrap fallback: only for the admin account, only when the real
    // backend wasn't configured, wasn't reachable, or hasn't been set up yet.
    if (username === BOOTSTRAP_ADMIN_USERNAME && password === BOOTSTRAP_ADMIN_PASSWORD) {
      state.user = { userId: 'bootstrap-admin', username: 'admin', role: 'admin', fullName: 'Administrator (Bootstrap Mode)' };
      state.bootstrapMode = true;
      routeToRoleHome();
      return;
    }

    errEl.innerHTML = isConfigured
      ? `<div class="error-msg">Invalid username or password.</div>`
      : `<div class="error-msg">Backend not configured yet (API_BASE_URL is still a placeholder), and these aren't the bootstrap admin credentials. See SETUP_GUIDE.md.</div>`;
  };
}

function routeToRoleHome() {
  if (state.user.role === 'admin') state.currentView = 'admin';
  else if (state.user.role === 'examiner') state.currentView = 'examiner';
  else state.currentView = 'candidateHome';
  render();
}

function logout() {
  stopAllTimers();
  state.user = null;
  state.currentView = 'login';
  render();
}

// ---------- ADMIN VIEW ----------
function renderAdmin() {
  const banner = state.bootstrapMode ? `
    <div class="card" style="border-color:var(--warn); background:var(--warn-bg);">
      <h2 style="color:var(--warn);">Bootstrap mode — backend not connected</h2>
      <div class="sub" style="color:var(--warn);">
        You're viewing the Admin panel without a live backend. Nothing you create here
        (users, exams, questions) will be saved until <strong>API_BASE_URL</strong> is set
        to your deployed Apps Script URL and <strong>setupSheetsAndFolders</strong> has been
        run at least once. See SETUP_GUIDE.md for the full walkthrough.
      </div>
    </div>` : '';

  return `
    ${banner}
    <div class="grid-2">
      <div class="card">
        <h2>Create user account</h2>
        <div class="sub">Add candidates, examiners, or administrators.</div>
        <label>Full name</label>
        <input type="text" id="newFullName" />
        <label>Username</label>
        <input type="text" id="newUsername" />
        <label>Password</label>
        <input type="password" id="newPassword" />
        <label>Role</label>
        <select id="newRole">
          <option value="candidate">Candidate</option>
          <option value="examiner">Examiner</option>
          <option value="admin">Admin</option>
        </select>
        <button class="btn" id="createUserBtn" style="margin-top:16px;">Create account</button>
        <div id="createUserMsg"></div>
      </div>

      <div class="card">
        <h2>Create exam</h2>
        <div class="sub">Set up a new timed test.</div>
        <label>Exam title</label>
        <input type="text" id="newExamTitle" placeholder="e.g. SS2 Mathematics — First Term" />
        <label>Duration (minutes)</label>
        <input type="number" id="newExamDuration" value="60" />
        <button class="btn" id="createExamBtn" style="margin-top:16px;">Create exam</button>
        <div id="createExamMsg"></div>
      </div>
    </div>

    <div class="card">
      <h2>Add question to exam</h2>
      <div class="sub">Supported types: multiple choice, true/false, short answer, drag-and-drop ordering, matching pairs.</div>
      <label>Exam ID</label>
      <input type="text" id="qExamId" placeholder="Paste examId shown after creating an exam" />
      <label>Question type</label>
      <select id="qType">
        <option value="mcq">Multiple choice</option>
        <option value="truefalse">True / False</option>
        <option value="shortanswer">Short answer</option>
        <option value="dragdrop">Drag &amp; drop ordering</option>
        <option value="matching">Matching pairs</option>
      </select>
      <label>Prompt</label>
      <textarea id="qPrompt" placeholder="Enter the question text"></textarea>
      <label>Options (one per line — for MCQ/drag-drop items/matching left column)</label>

// ---------- BULK UPLOAD HELPERS ----------

function downloadCSV(filename, csvText) {
  const blob = new Blob([csvText], { type: 'text/csv;charset=utf-8' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = filename;
  document.body.appendChild(a); a.click(); a.remove();
  URL.revokeObjectURL(url);
}

function readFileAsText(file) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = () => resolve(reader.result);
    reader.onerror = reject;
    reader.readAsText(file);
  });
}

function readFileAsArrayBuffer(file) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = () => resolve(reader.result);
    reader.onerror = reject;
    reader.readAsArrayBuffer(file);
  });
}

// Returns an array of row objects keyed by header name, from either a
// CSV/Notepad text file or an Excel (.xlsx/.xls) workbook's first sheet.
async function parseUploadedFile(file) {
  const isExcel = /\.xlsx$|\.xls$/i.test(file.name);
  if (isExcel) {
    if (typeof XLSX === 'undefined') throw new Error('Excel parser did not load — check your internet connection and reload the page.');
    const buffer = await readFileAsArrayBuffer(file);
    const workbook = XLSX.read(buffer, { type: 'array' });
    const firstSheetName = workbook.SheetNames[0];
    const sheet = workbook.Sheets[firstSheetName];
    return XLSX.utils.sheet_to_json(sheet, { defval: '' });
  }
  const text = await readFileAsText(file);
  return parseCSVText(text);
}

// Minimal CSV parser supporting quoted fields containing commas.
function parseCSVText(text) {
  const lines = text.split(/\r\n|\n|\r/).filter(l => l.trim().length > 0);
  if (!lines.length) return [];
  const parseLine = (line) => {
    const cells = [];
    let cur = '', inQuotes = false;
    for (let i = 0; i < line.length; i++) {
      const ch = line[i];
      if (inQuotes) {
        if (ch === '"' && line[i + 1] === '"') { cur += '"'; i++; }
        else if (ch === '"') { inQuotes = false; }
        else cur += ch;
      } else {
        if (ch === '"') inQuotes = true;
        else if (ch === ',') { cells.push(cur); cur = ''; }
        else cur += ch;
      }
    }
    cells.push(cur);
    return cells.map(c => c.trim());
  };
  const headers = parseLine(lines[0]).map(h => h.trim());
  return lines.slice(1).map(line => {
    const cells = parseLine(line);
    const obj = {};
    headers.forEach((h, i) => { obj[h] = cells[i] !== undefined ? cells[i] : ''; });
    return obj;
  });
}

function normalizeAssignmentRows(rawRows) {
  const valid = [], errors = [];
  rawRows.forEach((row, idx) => {
    const examId = String(row.examId || '').trim();
    const candidateId = String(row.candidateId || '').trim();
    const rowErrors = [];
    if (!examId) rowErrors.push('missing examId');
    if (!candidateId) rowErrors.push('missing candidateId');
    if (rowErrors.length) errors.push({ rowNumber: idx + 2, issues: rowErrors, raw: row });
    else valid.push({ examId, candidateId });
  });
  return { valid, errors };
}

function normalizeUserRows(rawRows) {
  const valid = [], errors = [];
  const allowedRoles = ['candidate', 'examiner', 'admin'];
  rawRows.forEach((row, idx) => {
    const fullName = String(row.fullName || '').trim();
    const username = String(row.username || '').trim();
    const password = String(row.password || '').trim();
    const role = String(row.role || '').trim().toLowerCase();
    const rowErrors = [];
    if (!fullName) rowErrors.push('missing fullName');
    if (!username) rowErrors.push('missing username');
    if (!password) rowErrors.push('missing password');
    if (!allowedRoles.includes(role)) rowErrors.push(`invalid role "${role}"`);
    if (rowErrors.length) errors.push({ rowNumber: idx + 2, issues: rowErrors, raw: row });
    else valid.push({ fullName, username, password, role });
  });
  return { valid, errors };
}

function normalizeQuestionRows(rawRows) {
  const valid = [], errors = [];
  const allowedTypes = ['mcq', 'truefalse', 'shortanswer', 'dragdrop', 'matching'];
  rawRows.forEach((row, idx) => {
    const examId = String(row.examId || '').trim();
    const type = String(row.type || '').trim().toLowerCase();
    const prompt = String(row.prompt || '').trim();
    const optionsRaw = String(row.options || '').trim();
    const correctRaw = String(row.correctAnswer || '').trim();
    const points = Number(row.points) || 1;
    const order = Number(row.order) || (idx + 1);
    const rowErrors = [];
    if (!examId) rowErrors.push('missing examId');
    if (!allowedTypes.includes(type)) rowErrors.push(`invalid type "${type}"`);
    if (!prompt) rowErrors.push('missing prompt');

    const options = optionsRaw ? optionsRaw.split(';').map(s => s.trim()).filter(Boolean) : [];
    let correctAnswer = correctRaw;
    if (type === 'dragdrop') correctAnswer = correctRaw ? correctRaw.split(';').map(s => s.trim()) : [];
    if (type === 'matching') {
      const pairs = {};
      correctRaw.split(';').filter(Boolean).forEach(pairStr => {
        const eq = pairStr.indexOf('=');
        if (eq > -1) pairs[pairStr.slice(0, eq).trim()] = pairStr.slice(eq + 1).trim();
      });
      correctAnswer = pairs;
      if (!Object.keys(pairs).length) rowErrors.push('matching correctAnswer must use left=right pairs separated by ;');
    }
    if ((type === 'mcq' || type === 'dragdrop' || type === 'matching') && options.length < 2) {
      rowErrors.push('needs at least 2 options');
    }

    if (rowErrors.length) errors.push({ rowNumber: idx + 2, issues: rowErrors, raw: row });
    else valid.push({ examId, type, prompt, options, correctAnswer, points, order });
  });
  return { valid, errors };
}

function renderPreviewTable(columns, validRows, errors, actionHtml) {
  let html = '<div class="preview-wrap"><table><tr>' + columns.map(c => `<th>${c}</th>`).join('') + '<th>Status</th></tr>';
  validRows.forEach(row => {
    html += '<tr>' + columns.map(c => `<td>${escapeHtml(Array.isArray(row[c]) ? row[c].join('; ') : (typeof row[c] === 'object' ? JSON.stringify(row[c]) : row[c]))}</td>`).join('') + '<td><span class="badge badge-ok">Ready</span></td></tr>';
  });
  errors.forEach(err => {
    html += `<tr class="row-error">` + columns.map(c => `<td>${escapeHtml(err.raw[c] !== undefined ? err.raw[c] : '')}</td>`).join('') + `<td><span class="badge badge-danger">Row ${err.rowNumber}: ${err.issues.join(', ')}</span></td></tr>`;
  });
  html += '</table></div>';
  html += `<div class="sub">${validRows.length} row(s) ready to upload${errors.length ? `, ${errors.length} row(s) with errors (will be skipped)` : ''}.</div>`;
  html += actionHtml;
  return html;
}

// Advisory tiers only — surfaced to help the examiner triage, never enforced
// by the system. The examiner decides the actual outcome for every sitting.
function recommendedAction(conductCount) {
  if (conductCount === 0) return { label: 'None', cls: 'badge-ok' };
  if (conductCount <= 2) return { label: 'Note on record', cls: 'badge-ok' };
  if (conductCount <= 5) return { label: 'Review recording before ratifying result', cls: 'badge-warn' };
  return { label: 'Detailed review — consider invalidation or supervised retake', cls: 'badge-danger' };
}

function csvEscape(value) {
  const s = String(value === undefined || value === null ? '' : value);
  return /[",\n]/.test(s) ? '"' + s.replace(/"/g, '""') + '"' : s;
}

    if (recordingsRes.success && recordingsRes.recordings && recordingsRes.recordings.length) {
      html += `<div class="sub">Each candidate's full session recording, in sequential segments. "Open folder" opens the candidate's recording folder in Google Drive — use Drive's <strong>Download all</strong> button there to download every segment as a single ZIP.</div>`;
      html += '<table><tr><th>Candidate</th><th>Segments</th><th>Recorded from</th><th>Until</th><th>Download</th></tr>';
      recordingsRes.recordings.forEach(rec => {
        const name = rec.fullName ? `${rec.fullName} (${rec.candidateId})` : rec.candidateId;
        const link = rec.folderUrl
          ? `<a href="${escapeAttr(rec.folderUrl)}" target="_blank" rel="noopener" class="btn btn-outline btn-sm" style="text-decoration:none;">Open folder</a>`
          : '<span class="badge badge-warn">folder unavailable</span>';
        html += `<tr>
          <td>${escapeHtml(name)}</td>
          <td>${rec.chunkCount}</td>
          <td>${rec.firstAt ? new Date(rec.firstAt).toLocaleString() : '—'}</td>
          <td>${rec.lastAt ? new Date(rec.lastAt).toLocaleString() : '—'}</td>
          <td>${link}</td>
        </tr>`;
      });
      html += '</table>';
    } else {
      html += '<div class="empty-state">No recordings found for this exam yet.</div>';
    }
    html += '</div>';

    html += '<div class="card"><h2>Violation log (detail)</h2>';
    if (violationsRes.success && violationsRes.violations.length) {
      html += '<table><tr><th>Candidate</th><th>Type</th><th>Detail</th><th>Time</th></tr>';
      violationsRes.violations.forEach(v => {
        html += `<tr><td>${escapeHtml(v.candidateId)}</td><td><span class="badge badge-warn">${escapeHtml(v.type)}</span></td><td>${escapeHtml(v.detail || '—')}</td><td>${new Date(v.timestamp).toLocaleString()}</td></tr>`;
      });
      html += '</table>';
    } else {
      html += '<div class="empty-state">No violations recorded.</div>';
    }
    html += '</div>';
    resultsBody.innerHTML = html;

    const dlBtn = document.getElementById('downloadReportBtn');
    if (dlBtn) {
      dlBtn.onclick = () => {
        const header = ['candidateId', 'fullName', 'username', 'status', 'startedAt', 'score', 'maxScore', 'answered', 'conductViolations', 'technicalIssues', 'suggestedAction'];
        const lines = [header.join(',')];
        reportRes.report.forEach(r => {
          const rec = recommendedAction(Number(r.conductViolations) || 0);
          lines.push([
            r.candidateId, r.fullName, r.username, r.status, r.startedAt,
            r.score, r.maxScore, r.answered, r.conductViolations, r.technicalIssues, rec.label
          ].map(csvEscape).join(','));
        });
        downloadCSV(`exam_report_${examId}.csv`, lines.join('\n'));
      };
    }
  };
}

// ---------- CANDIDATE HOME ----------

  return `
    <div class="card">
      <h2>Start an exam</h2>
      <div class="sub">Enter the exam ID provided by your examination centre.</div>

function attachCandidateHomeHandlers() {

    if (!result.questions || result.questions.length === 0) {

// ---------- PERMISSION GATE (camera/mic) ----------
function renderPermissionGate() {
  return `
    <div class="gate-overlay">
      <div class="gate-card">
        <div class="gate-icon">🎥</div>
        <h2>Camera &amp; microphone required</h2>
        <p>${escapeHtml(state.exam.title)} must be taken with your camera and microphone active for the full duration. Recording begins automatically once you continue and cannot be paused or disabled.</p>
        <ul class="gate-list">
          <li>Ensure you are alone, in a quiet, well-lit room.</li>
          <li>Keep your face visible in the camera frame throughout.</li>
          <li>The exam will run in fullscreen. Exiting fullscreen or switching tabs is logged as a violation.</li>
          <li>You will not be able to start the exam without granting access.</li>
        </ul>
        <button class="btn btn-gold" id="grantAccessBtn" style="width:100%;">Enable camera &amp; microphone to continue</button>
        <div id="gateError" style="margin-top:14px;"></div>
      </div>
    </div>
  `;
}

function attachGateHandlers() {
  document.getElementById('grantAccessBtn').onclick = async () => {
    const errEl = document.getElementById('gateError');
    errEl.innerHTML = '';
    try {
      // Resolution/frame-rate are deliberately capped: this keeps each recorded
      // segment small enough to upload reliably over the variable connectivity
      // candidates may have across Lagos State, without materially reducing
      // proctoring usefulness (a small, low-frame-rate feed is still enough to
      // verify identity and detect a second person in frame).
      const stream = await navigator.mediaDevices.getUserMedia({
        video: { width: { ideal: 640, max: 640 }, height: { ideal: 480, max: 480 }, frameRate: { ideal: 15, max: 15 } },
        audio: true
      });
      state.mediaStream = stream;
      stream.getTracks().forEach(track => {
        track.addEventListener('ended', () => {
          if (!state.examSubmitted) handleChunkUploadFailure(`${track.kind} track ended unexpectedly — device may have been disconnected or permission revoked.`);
        });
      });

      // Preflight: record and upload a short test clip BEFORE the exam
      // begins, so a broken recording/upload path is caught loudly now,
      // not silently mid-exam.
      errEl.innerHTML = '<div class="sub" style="color:#C7D6E3;">Testing your camera recording and upload… this takes a few seconds.</div>';
      const preflight = await runRecordingPreflight();
      if (!preflight.ok) {
        state.mediaStream.getTracks().forEach(t => t.stop());
        state.mediaStream = null;
        errEl.innerHTML = `<div class="error-msg">Recording system check failed: ${preflight.reason}<br><br>Please notify your invigilator, check your internet connection, and press the button above to try again. The exam cannot begin until this check passes.</div>`;
        return;
      }

      await enterFullscreen();
      beginExam();
    } catch (e) {
      errEl.innerHTML = `<div class="error-msg">Camera/microphone access was denied or unavailable. You must grant access to begin the exam. (${e.message})</div>`;
    }
  };
}

async function enterFullscreen() {
  const el = document.documentElement;
  try {
    if (el.requestFullscreen) await el.requestFullscreen();
    else if (el.webkitRequestFullscreen) await el.webkitRequestFullscreen();
  } catch (e) { /* some browsers require direct user gesture; button click satisfies this */ }
}

// ---------- EXAM FLOW ----------
function beginExam() {
  state.timeRemainingSec = state.serverRemainingSec !== null && state.serverRemainingSec !== undefined
    ? state.serverRemainingSec
    : Number(state.exam.durationMinutes) * 60;
  state.violationCount = 0;
  state.examSubmitted = false;
  state.recordingHealth = 'starting';
  state.recordingFailCount = 0;
  state.currentView = 'exam';
  render();

  if (state.isResumedSession) showViolationToast('Resuming your exam with your remaining time — the clock did not reset.');

  apiPost('startSession', { examId: state.exam.examId, candidateId: state.user.userId });
  startRecording();
  startTimer();
  startAnswerSync();
  startHeartbeat();
  attachProctoringListeners();
}

function renderExam() {
  if (!state.questions || state.questions.length === 0) {
    return `<div class="card"><h2>No questions available</h2><div class="empty-state">This exam currently has no questions loaded. Please contact your exam administrator.</div></div>`;
  }
  const q = state.questions[state.currentQuestionIndex];
  const navButtons = state.questions.map((qq, i) => {
    const answered = state.answers[qq.questionId] !== undefined;
    const cls = i === state.currentQuestionIndex ? 'current' : (answered ? 'answered' : '');
    return `<button class="qn-btn ${cls}" data-idx="${i}">${i + 1}</button>`;
  }).join('');

  return `
    <div class="exam-topbar">
      <div class="rec-indicator" id="recIndicator">${renderRecIndicatorContent()}</div>
      <div class="timer" id="timerDisplay">--:--</div>
    </div>
    <div class="exam-shell">
      <div>
        <div class="card">
          <div class="question-nav">${navButtons}</div>
          <div class="q-prompt">${state.currentQuestionIndex + 1}. ${escapeHtml(q.prompt)}</div>
          <div id="questionBody">${renderQuestionBody(q)}</div>
          <div class="exam-actions">
            <button class="btn btn-outline" id="prevBtn" ${state.currentQuestionIndex === 0 ? 'disabled' : ''}>Previous</button>
            ${state.currentQuestionIndex === state.questions.length - 1
              ? `<button class="btn btn-gold" id="submitBtn">Submit exam</button>`
              : `<button class="btn" id="nextBtn">Save &amp; next</button>`}
          </div>
        </div>
      </div>
      <div class="side-panel">
        <div class="card">
          <video id="camPreview" class="cam-preview" autoplay muted playsinline></video>
          <div class="sub" style="margin-top:10px;">Your camera and microphone are being recorded for the full duration of this exam.</div>
        </div>
      </div>
    </div>
  `;
}

function renderQuestionBody(q) {
  const current = state.answers[q.questionId];
  if (q.type === 'mcq' || q.type === 'truefalse') {
    const options = q.type === 'truefalse' ? ['True', 'False'] : q.options;
    return `<div class="options-list">` + options.map((opt, i) => `
      <label class="option-row ${current === opt ? 'selected' : ''}" data-opt="${escapeAttr(opt)}">
        <input type="radio" name="mcq" ${current === opt ? 'checked' : ''} />
        <span>${escapeHtml(opt)}</span>
      </label>`).join('') + `</div>`;
  }
  if (q.type === 'shortanswer') {
    return `<textarea id="shortAnswerInput" placeholder="Type your answer">${current ? escapeHtml(current) : ''}</textarea>`;
  }
  if (q.type === 'dragdrop') {
    const order = current || [...q.options];
    return `<div class="dragdrop-list" id="dragList">` + order.map((item, i) => `
      <div class="drag-item" draggable="true" data-item="${escapeAttr(item)}">
        <span class="drag-index">${i + 1}</span>
        <span class="drag-handle">☰</span>
        <span>${escapeHtml(item)}</span>
      </div>`).join('') + `</div><div class="sub" style="margin-top:10px;">Drag items into the correct order.</div>`;
  }
  if (q.type === 'matching') {
    // options assumed to be "Left | Right" pairs encoded as separate arrays via prompt convention;
    // here we treat q.options as left items, and reuse them shuffled as right choices.
    const rightChoices = shuffle([...q.options]);
    const selections = current || {};
    return `<div class="match-grid">
      <div><div class="match-col-title">Item</div>${q.options.map((left, i) => `
        <div class="match-item">${escapeHtml(left)}
          <select class="match-select" data-left="${escapeAttr(left)}">
            <option value="">— select match —</option>
            ${rightChoices.map(r => `<option value="${escapeAttr(r)}" ${selections[left] === r ? 'selected' : ''}>${escapeHtml(r)}</option>`).join('')}
          </select>
        </div>`).join('')}</div>
      <div><div class="match-col-title">Matches with</div>
        <div class="sub">Choose the corresponding match from the dropdown next to each item.</div>
      </div>
    </div>`;
  }
  return '<div class="empty-state">Unsupported question type.</div>';
}

function attachExamHandlers() {
  if (!state.questions || state.questions.length === 0) return;
  const q = state.questions[state.currentQuestionIndex];

  if (document.getElementById('camPreview') && state.mediaStream) {
    document.getElementById('camPreview').srcObject = state.mediaStream;
  }

  document.querySelectorAll('.qn-btn').forEach(btn => {
    btn.onclick = () => { persistCurrentAnswer(); state.currentQuestionIndex = Number(btn.dataset.idx); render(); };
  });

  if (q.type === 'mcq' || q.type === 'truefalse') {
    document.querySelectorAll('.option-row').forEach(row => {
      row.onclick = () => { state.answers[q.questionId] = row.dataset.opt; render(); };
    });
  }

  if (q.type === 'dragdrop') {
    setupDragAndDrop(q);
  }

  if (q.type === 'matching') {
    document.querySelectorAll('.match-select').forEach(sel => {
      sel.onchange = () => {
        const current = state.answers[q.questionId] || {};
        current[sel.dataset.left] = sel.value;
        state.answers[q.questionId] = current;
        localSaveAnswers();
      };
    });
  }

  const prevBtn = document.getElementById('prevBtn');
  if (prevBtn) prevBtn.onclick = () => { persistCurrentAnswer(); state.currentQuestionIndex--; render(); };

  const nextBtn = document.getElementById('nextBtn');
  if (nextBtn) nextBtn.onclick = () => { persistCurrentAnswer(); state.currentQuestionIndex++; render(); };

  const submitBtn = document.getElementById('submitBtn');
  if (submitBtn) submitBtn.onclick = () => { persistCurrentAnswer(); confirmSubmit(); };
}

function persistCurrentAnswer() {
  const q = state.questions[state.currentQuestionIndex];
  if (q.type === 'shortanswer') {
    const el = document.getElementById('shortAnswerInput');
    if (el) state.answers[q.questionId] = el.value;
  }
  localSaveAnswers();
}

function setupDragAndDrop(q) {
  const list = document.getElementById('dragList');
  let dragEl = null;
  list.querySelectorAll('.drag-item').forEach(item => {
    item.addEventListener('dragstart', () => { dragEl = item; item.classList.add('dragging'); });
    item.addEventListener('dragend', () => {
      item.classList.remove('dragging');
      const newOrder = [...list.querySelectorAll('.drag-item')].map(el => el.dataset.item);
      state.answers[q.questionId] = newOrder;
      localSaveAnswers();
      renderDragIndices();
    });
    item.addEventListener('dragover', e => {
      e.preventDefault();
      const after = getDragAfterElement(list, e.clientY);
      if (after == null) list.appendChild(dragEl);
      else list.insertBefore(dragEl, after);
    });
  });
}

function renderDragIndices() {
  document.querySelectorAll('#dragList .drag-item').forEach((el, i) => {
    el.querySelector('.drag-index').textContent = i + 1;
  });
}

function getDragAfterElement(container, y) {
  const items = [...container.querySelectorAll('.drag-item:not(.dragging)')];
  return items.reduce((closest, child) => {
    const box = child.getBoundingClientRect();
    const offset = y - box.top - box.height / 2;
    if (offset < 0 && offset > closest.offset) return { offset, element: child };
    return closest;
  }, { offset: -Infinity }).element;
}

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) { const j = Math.floor(Math.random() * (i + 1)); [a[i], a[j]] = [a[j], a[i]]; }
  return a;
}

// ---------- TIMER ----------
function startTimer() {
  updateTimerDisplay();
  state.timerHandle = setInterval(() => {
    state.timeRemainingSec--;
    updateTimerDisplay();
    if (state.timeRemainingSec <= 0) { clearInterval(state.timerHandle); autoSubmit(); }
  }, 1000);
}

function updateTimerDisplay() {
  const el = document.getElementById('timerDisplay');
  if (!el) return;
  const m = Math.floor(state.timeRemainingSec / 60);
  const s = state.timeRemainingSec % 60;
  el.textContent = `${String(m).padStart(2, '0')}:${String(s).padStart(2, '0')}`;
  el.classList.toggle('low', state.timeRemainingSec <= 60);
}

// ---------- ANSWER SYNC (local-first, batched) ----------
function startAnswerSync() {
  state.syncHandle = setInterval(syncAnswersToServer, ANSWER_SYNC_INTERVAL_MS);
}

async function syncAnswersToServer() {
  if (!state.exam || state.examSubmitted) return;
  const answers = Object.entries(state.answers).map(([questionId, answer]) => ({ questionId, answer }));
  if (!answers.length) return;
  try {
    const result = await apiPost('submitAnswers', { examId: state.exam.examId, candidateId: state.user.userId, answers });
    if (result && result.alreadySubmitted) forceCloseAlreadySubmitted();
  } catch (e) { /* will retry on next interval; local copy remains source of truth */ }
}

function forceCloseAlreadySubmitted() {
  if (state.examSubmitted) return;
  state.examSubmitted = true;
  stopAllTimers();
  detachProctoringListeners();
  stopRecording();
  if (document.fullscreenElement && document.exitFullscreen) document.exitFullscreen().catch(() => {});
  alert('This exam session is already marked as submitted (it may have been finalized from another tab or after a disconnection). You cannot continue.');
  state.currentView = 'examSubmitted';
  render();
}

function startHeartbeat() {
  state.heartbeatHandle = setInterval(() => {
    apiPost('startSession', { examId: state.exam.examId, candidateId: state.user.userId }).catch(() => {});
  }, HEARTBEAT_INTERVAL_MS);
}

// ---------- RECORDING (camera/mic -> chunked upload to Drive) ----------
function renderRecIndicatorContent() {
  if (state.recordingHealth === 'ok') {
    return `<span class="rec-dot"></span> RECORDING — camera &amp; audio active`;
  }
  if (state.recordingHealth === 'starting') {
    return `<span class="rec-dot"></span> Starting recording…`;
  }
  if (state.recordingHealth === 'warning') {
    return `<span class="rec-dot" style="background:#F5B041;"></span> Recording upload delayed — retrying`;
  }
  return `<span class="rec-dot" style="background:#F5B041; animation:none;"></span> ⚠ Recording issue detected — notify your invigilator`;
}

function updateRecIndicatorDOM() {
  const el = document.getElementById('recIndicator');
  if (el) el.innerHTML = renderRecIndicatorContent();
}

function setRecordingHealth(status) {
  state.recordingHealth = status;
  updateRecIndicatorDOM();
}

// Records ~2.5 seconds from the already-granted media stream and uploads it
// through the exact same pipeline real exam chunks use. Returns {ok, reason}.
// This proves camera capture, encoding, base64 transport, Apps Script, and
// Drive write all work end-to-end before the exam is allowed to begin.
const REQUIRED_BACKEND_VERSION_PREFIX = 'v2.4';

async function runRecordingPreflight() {
  // Step 1: confirm the LIVE backend is running current code. A stale
  // deployment is the most common cause of recording failures, so it is
  // named explicitly rather than surfacing as a cryptic decode error.
  try {
    const ping = await apiGet('ping', {});
    if (!ping || !ping.success) {
      return { ok: false, reason: 'The server did not respond to a status check. Check the internet connection and the backend deployment.' };
    }
    if (!ping.version) {
      return { ok: false, reason: 'The live backend is running OUTDATED code (no version marker found). The administrator must paste the latest Code.gs into Apps Script and create a NEW VERSION on this deployment (Deploy → Manage deployments → edit → Version: New version → Deploy). Saving the code alone does not update the live URL.' };
    }
    if (String(ping.version).indexOf(REQUIRED_BACKEND_VERSION_PREFIX) !== 0) {
      return { ok: false, reason: `The live backend version is "${ping.version}" but this app requires ${REQUIRED_BACKEND_VERSION_PREFIX}. The administrator must paste the latest Code.gs and deploy a NEW VERSION on this deployment.` };
    }
  } catch (e) {
    return { ok: false, reason: 'Could not reach the server for a status check: ' + e.message };
  }

  // Step 2: full end-to-end recording test.
  try {
    const mimeCandidates = ['video/webm;codecs=vp8,opus', 'video/webm;codecs=vp9,opus', 'video/webm', 'video/mp4'];
    const mimeType = mimeCandidates.find(m => MediaRecorder.isTypeSupported(m)) || 'video/webm';
    const blob = await new Promise((resolve, reject) => {
      const rec = new MediaRecorder(state.mediaStream, { mimeType, videoBitsPerSecond: 350000, audioBitsPerSecond: 64000 });
      const parts = [];
      rec.ondataavailable = e => { if (e.data && e.data.size > 0) parts.push(e.data); };
      rec.onerror = () => reject(new Error('MediaRecorder failed during the test clip.'));
      rec.onstop = () => resolve(new Blob(parts, { type: mimeType }));
      rec.start();
      setTimeout(() => { if (rec.state !== 'inactive') rec.stop(); }, 2500);
    });
    if (!blob || blob.size === 0) return { ok: false, reason: 'The test clip came back empty — your camera may be in use by another application.' };
    const base64Data = await blobToBase64(blob);
    const result = await apiPost('uploadRecordingChunk', {
      examId: state.exam.examId, candidateId: state.user.userId,
      chunkIndex: 0, mimeType, base64Data, isPreflight: true
    }, 30000);
    if (result && result.success) return { ok: true };
    return { ok: false, reason: (result && result.error) || 'The server rejected the test upload.' };
  } catch (e) {
    const reason = e.name === 'AbortError'
      ? 'The test upload timed out — your connection may be too slow or unstable right now.'
      : e.message;
    return { ok: false, reason };
  }
}

function startRecording() {
  if (!state.mediaStream) return;
  state.chunkIndex = 0;
  startNewRecorderSegment();
}

function startNewRecorderSegment() {
  try {
    // VP8 first: broader hardware compatibility and lower encoding overhead
    // than VP9 across the varied device specs candidates may be using.
    const mimeCandidates = ['video/webm;codecs=vp8,opus', 'video/webm;codecs=vp9,opus', 'video/webm', 'video/mp4'];
    const mimeType = mimeCandidates.find(m => MediaRecorder.isTypeSupported(m)) || 'video/webm';
    // Explicit bitrate cap keeps each ~30s segment to roughly 1.5-2MB
    // regardless of device/browser encoder defaults, so uploads stay fast
    // and reliable even on weaker connections.
    const recorder = new MediaRecorder(state.mediaStream, {
      mimeType,
      videoBitsPerSecond: 350000,
      audioBitsPerSecond: 64000
    });
    const chunks = [];

    recorder.ondataavailable = e => { if (e.data && e.data.size > 0) chunks.push(e.data); };
    recorder.onerror = () => handleChunkUploadFailure('MediaRecorder reported an error mid-segment.');
    recorder.onstop = async () => {
      const blob = new Blob(chunks, { type: mimeType });
      await uploadChunk(blob, mimeType, state.chunkIndex);
      state.chunkIndex++;
      if (!state.examSubmitted) startNewRecorderSegment(); // continue recording next segment
    };

    recorder.start();
    state.mediaRecorder = recorder;
    setTimeout(() => { if (recorder.state !== 'inactive') recorder.stop(); }, RECORDING_CHUNK_SECONDS * 1000);
  } catch (e) {
    handleChunkUploadFailure('Could not start a new recording segment: ' + e.message);
  }
}

function stopRecording() {
  if (state.mediaRecorder && state.mediaRecorder.state !== 'inactive') state.mediaRecorder.stop();
  if (state.mediaStream) state.mediaStream.getTracks().forEach(t => t.stop());
}

async function uploadChunk(blob, mimeType, chunkIndex) {
  if (!blob || blob.size === 0) {
    handleChunkUploadFailure('Recorded segment was empty (0 bytes) — camera/mic stream may have stopped.');
    return;
  }
  try {
    const base64Data = await blobToBase64(blob);
    const result = await apiPost('uploadRecordingChunk', {
      examId: state.exam.examId, candidateId: state.user.userId,
      chunkIndex, mimeType, base64Data
    }, 60000); // bounded timeout — a stalled upload shouldn't hang indefinitely
    if (result && result.success) {
      state.recordingFailCount = 0;
      setRecordingHealth('ok');
    } else {
      handleChunkUploadFailure((result && result.error) || 'Backend rejected the recording chunk.');
    }
  } catch (e) {
    const detail = e.name === 'AbortError' ? 'Upload timed out after 60 seconds (slow or dropped connection).' : ('Could not reach the server to upload the recording chunk: ' + e.message);
    handleChunkUploadFailure(detail);
  }
}

function handleChunkUploadFailure(detail) {
  state.recordingFailCount++;
  setRecordingHealth(state.recordingFailCount >= 3 ? 'failed' : 'warning');
  // Best-effort audit trail — logged as a violation so examiners can see
  // recording gaps during review, even though the exam itself is not halted.
  if (state.exam && state.user) {
    apiPost('logViolation', {
      examId: state.exam.examId, candidateId: state.user.userId,
      type: 'recording_upload_failed', detail
    }).catch(() => {});
  }
}

function blobToBase64(blob) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onloadend = () => {
      // The data URL header itself can contain a comma when the MIME type
      // includes a codecs list (e.g. "data:video/webm;codecs=vp8,opus;base64,<data>"),
      // so splitting on ',' grabs a header fragment instead of the payload.
      // Take everything after the "base64," marker instead.
      const result = reader.result;
      const marker = 'base64,';
      const idx = result.indexOf(marker);
      if (idx === -1) { reject(new Error('Unexpected data URL format from FileReader.')); return; }
      const standard = result.slice(idx + marker.length);
      // Web-safe base64 (- and _ instead of + and /): the '+' character can
      // be silently converted to a space in transit, corrupting the payload.
      resolve(standard.replace(/\+/g, '-').replace(/\//g, '_'));
    };
    reader.onerror = reject;
    reader.readAsDataURL(blob);
  });
}

// ---------- PROCTORING (fullscreen + tab-switch detection) ----------
function attachProctoringListeners() {
  document.addEventListener('visibilitychange', onVisibilityChange);
  document.addEventListener('fullscreenchange', onFullscreenChange);
  window.addEventListener('blur', onWindowBlur);
}

function detachProctoringListeners() {
  document.removeEventListener('visibilitychange', onVisibilityChange);
  document.removeEventListener('fullscreenchange', onFullscreenChange);
  window.removeEventListener('blur', onWindowBlur);
}

function onVisibilityChange() {
  if (document.hidden && !state.examSubmitted) recordViolation('tab_switch', 'Candidate switched tabs or minimized the window.');
}

function onFullscreenChange() {
  if (!document.fullscreenElement && !state.examSubmitted) {
    recordViolation('fullscreen_exit', 'Candidate exited fullscreen mode.');
    enterFullscreen(); // attempt to re-enforce
  }
}

function onWindowBlur() {
  if (!state.examSubmitted) recordViolation('window_blur', 'Exam window lost focus.');
}

function recordViolation(type, detail) {
  apiPost('logViolation', { examId: state.exam.examId, candidateId: state.user.userId, type, detail }).catch(() => {});

  if (CONDUCT_VIOLATION_TYPES.includes(type)) {
    state.violationCount++;
    showViolationToast(`${detail} This incident has been logged (conduct flag ${state.violationCount}) and will be available to the examiner reviewing this sitting.`);
  } else {
    showViolationToast(detail);
  }
}

function showViolationToast(detail) {
  const toast = document.createElement('div');
  toast.className = 'violation-toast';
  toast.textContent = `⚠ Flagged: ${detail}`;
  document.body.appendChild(toast);
  setTimeout(() => toast.remove(), 4000);
}

// ---------- SUBMIT ----------
function confirmSubmit() {
  const unanswered = state.questions.length - Object.keys(state.answers).length;
  const warning = unanswered > 0 ? `You have ${unanswered} unanswered question(s). ` : '';
  if (confirm(`${warning}Submit your exam now? This cannot be undone.`)) submitExam();
}

function autoSubmit() {
  alert('Time is up. Your exam is being submitted automatically.');
  submitExam();
}

async function submitExam() {
  state.examSubmitted = true;
  stopAllTimers();
  detachProctoringListeners();

  const answers = Object.entries(state.answers).map(([questionId, answer]) => ({ questionId, answer }));
  try {
    await apiPost('submitFinalAnswers', { examId: state.exam.examId, candidateId: state.user.userId, answers });
  } catch (e) { /* local copy retained in localStorage regardless */ }

  stopRecording();
  if (document.fullscreenElement && document.exitFullscreen) document.exitFullscreen().catch(() => {});

  localStorage.removeItem(LOCAL_KEY_PREFIX + state.exam.examId + '_' + state.user.userId);

  state.currentView = 'examSubmitted';
  render();
}

function stopAllTimers() {
  if (state.timerHandle) clearInterval(state.timerHandle);
  if (state.syncHandle) clearInterval(state.syncHandle);
  if (state.heartbeatHandle) clearInterval(state.heartbeatHandle);
}

function renderSubmitted() {
  return `
    <div class="card" style="text-align:center; padding:50px 20px;">
      <div style="font-size:40px;">✅</div>
      <h2>Exam submitted</h2>
      <p class="sub">Your responses have been recorded. You may now close this window.</p>
    </div>
  `;
}

// ---------- UTIL ----------
function escapeHtml(str) {
  return String(str).replace(/[&<>"']/g, c => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c]));
}
function escapeAttr(str) { return escapeHtml(str).replace(/`/g, '&#96;'); }

// ---------- INIT ----------
// Deterrents against casual source inspection: right-click (view source /
// inspect) and the common DevTools shortcuts are disabled app-wide.
// Note: this raises the bar for average candidates but is not absolute —
// determined users can still open DevTools from the browser menu or before
// the page loads. Real integrity comes from the server-side controls
// (answers validated server-side, correct answers never sent to candidates,
// proctoring recording, and violation logging).
document.addEventListener('contextmenu', (e) => {
  e.preventDefault();
  if (state.currentView === 'exam' && !state.examSubmitted) {
    showViolationToast('Right-click is disabled during this exam.');
  }
});

document.addEventListener('keydown', (e) => {
  const key = (e.key || '').toLowerCase();
  const blocked =
    e.key === 'F12' ||                                        // DevTools
    (e.ctrlKey && e.shiftKey && ['i', 'j', 'c'].includes(key)) || // Inspect / Console / Element picker
    (e.ctrlKey && key === 'u');                               // View source
  if (blocked) {
    e.preventDefault();
    e.stopPropagation();
    if (state.currentView === 'exam' && !state.examSubmitted) {
      showViolationToast('Developer tools are disabled during this exam.');
    }
  }
});

window.addEventListener('beforeunload', (e) => {
  if (state.currentView === 'exam' && !state.examSubmitted) {
    e.preventDefault();
    e.returnValue = '';
  }
});

render();
</script>
</body>
</html>
